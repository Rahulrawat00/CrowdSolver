<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Secure Access</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s ease;
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ================= BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.1;
}
.orb-1 { background: var(--accent-primary); top: -100px; left: -100px; }

/* ================= TOP NAV ================= */
.top-nav {
    height: 70px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
}

.brand {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -1px;
}

/* ================= LOGIN CARD ================= */
.page-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 50px 40px;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
}

/* Accent Line */
.login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; width: 80%; height: 2px;
    background: var(--accent-primary);
    box-shadow: 0 0 15px var(--accent-primary);
}

.login-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    margin: 0;
    text-transform: uppercase;
    letter-spacing: -1px;
}

.login-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 12px 0 35px;
}

/* ================= FORM ELEMENTS ================= */
.error-msg {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 14px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 24px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    display: flex;
    align-items: center;
    gap: 10px;
}

.form-group {
    margin-bottom: 22px;
}

label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent-primary);
    margin-bottom: 8px;
    font-weight: 700;
}

input {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: var(--accent-primary);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
}

/* ================= BUTTON ================= */
.btn-login {
    width: 100%;
    padding: 16px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-login:hover {
    background: var(--accent-primary);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
}

/* ================= FOOTER ================= */
.login-footer {
    margin-top: 30px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
}

.login-footer a {
    color: var(--text-main);
    font-weight: 700;
    text-decoration: none;
    margin-left: 5px;
    border-bottom: 1px solid var(--glass-border);
}

.login-footer a:hover {
    color: var(--accent-primary);
    border-color: var(--accent-primary);
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
</div>

<nav class="top-nav">
    <div class="brand">CROWDSOLVER</div>
</nav>

<div class="page-container">
    <div class="login-card">

        <h2>Terminal Login</h2>
        <p>Authenticate to access the member ecosystem.</p>

        {% if err %}
            <div class="error-msg">
                <i class="fa-solid fa-triangle-exclamation"></i> {{ err }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Electronic Mail</label>
                <input type="email" name="loginmail" placeholder="user@terminal.io" required>
            </div>

            <div class="form-group">
                <label>Access Key</label>
                <input type="password" name="loginpassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Initialize Session</button>
        </form>

        <div class="login-footer">
            New to the grid?
            <a href="{% url 'membersignup' %}">Request Access</a>
        </div>

    </div>
</div>

</body>
</html>
