<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Member Login</title>

<style>
:root{
    --primary:#2563eb;
    --bg:#f5f8ff;
    --card:rgba(255,255,255,0.88);
    --border:rgba(229,231,235,0.8);
    --text:#0f172a;
    --muted:#64748b;
}

*{
    box-sizing:border-box;
    font-family:"Inter","Segoe UI",sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(180deg,#f8faff,#f4f6fb);
    color:var(--text);
}

/* ===== BLUR BACKGROUND SHAPES ===== */
.bg-shapes{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
    pointer-events:none;
}

.shape{
    position:absolute;
    width:420px;
    height:420px;
    border-radius:50%;
    filter:blur(140px);
    opacity:.35;
}

.shape.one{
    background:#60a5fa;
    top:-140px;
    left:-140px;
}

.shape.two{
    background:#818cf8;
    bottom:-180px;
    right:-160px;
}

.shape.three{
    background:#c084fc;
    top:35%;
    left:55%;
}

/* ===== TOP NAV ===== */
.top-nav{
    height:64px;
    background:var(--card);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:center;
    position:sticky;
    top:0;
    z-index:10;
}

.brand{
    font-size:18px;
    font-weight:600;
    color:var(--primary);
}

/* ===== PAGE ===== */
.page{
    min-height:calc(100vh - 64px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
}

/* ===== LOGIN CARD ===== */
.card{
    width:100%;
    max-width:420px;
    background:var(--card);
    backdrop-filter:blur(14px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:36px 34px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

/* ===== HEADER ===== */
.card h2{
    margin:0;
    font-size:24px;
    font-weight:600;
}

.card p{
    margin:8px 0 26px;
    font-size:14px;
    color:var(--muted);
}

.error-msg{
    margin-bottom:20px;
    padding:14px 16px;
    background:#fee2e2;
    color:#991b1b;
    border:1px solid #fecaca;
    border-radius:12px;
    font-size:14px;
}

/* ===== FORM ===== */
label{
    font-size:13px;
    font-weight:500;
    color:#334155;
}

input{
    width:100%;
    padding:12px 14px;
    margin-top:6px;
    margin-bottom:18px;
    border-radius:12px;
    border:1px solid var(--border);
    font-size:14px;
    background:#fff;
}

input:focus{
    outline:none;
    border-color:var(--primary);
}

/* ===== BUTTON ===== */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:#ffffff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:.2s ease;
}

.btn:hover{
    background:#1e40af;
    transform:translateY(-1px);
}

/* ===== FOOTER ===== */
.footer{
    margin-top:22px;
    text-align:center;
    font-size:14px;
    color:var(--muted);
}

.footer a{
    color:var(--primary);
    font-weight:500;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<!-- BACKGROUND SHAPES -->
<div class="bg-shapes">
    <span class="shape one"></span>
    <span class="shape two"></span>
    <span class="shape three"></span>
</div>

<!-- NAV -->
<div class="top-nav">
    <div class="brand">CrowdSolver</div>
</div>

<!-- LOGIN -->
<div class="page">
    <div class="card">

        <h2>Welcome back</h2>
        <p>Login to continue contributing to your community</p>

        {% if err %}
            <div class="error-msg">{{ err }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Email address</label>
            <input type="email" name="loginmail" placeholder="you@example.com" required>

            <label>Password</label>
            <input type="password" name="loginpassword" placeholder="Enter your password" required>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="footer">
            Don’t have an account?
            <a href="{% url 'membersignup' %}">Sign up</a>
        </div>

    </div>
</div>

</body>
</html>
