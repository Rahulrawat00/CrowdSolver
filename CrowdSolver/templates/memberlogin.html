<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Secure Access</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1;
    --accent-secondary: #FF4DCC;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html {
    font-size: clamp(14px, 1.2vw, 16px);
}

h1 { font-size: clamp(2rem, 4vw, 3rem); }
h2 { font-size: clamp(1.6rem, 3vw, 2.4rem); }
h3 { font-size: clamp(1.25rem, 2.3vw, 1.8rem); }
p, label, button, input, textarea, select { font-size: clamp(0.95rem, 1.1vw, 1rem); }

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 10% 10%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
}
.orb-1 { background: var(--accent-primary); top: -200px; right: -100px; }
.orb-2 { background: var(--accent-secondary); bottom: -200px; left: -100px; }

/* ================= TOP NAV ================= */
.top-nav {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
}

.brand {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -1px;
    text-decoration: none;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand::after {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--accent-secondary);
    border-radius: 50%;
}

/* ================= LOGIN CARD ================= */
.page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.login-card {
    width: 100%;
    max-width: min(100%, 480px);
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: clamp(28px, 4vw, 50px);
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
}

.login-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 50px; right: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
}

.login-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 3vw, 2.4rem);
    font-weight: 800;
    margin: 0;
    letter-spacing: -1px;
}

.login-card p {
    color: var(--text-dim);
    font-size: clamp(0.95rem, 1vw, 1rem);
    margin: 10px 0 35px;
}

/* ================= FORM ELEMENTS ================= */
.input-group {
    margin-bottom: 24px;
}

label {
    display: block;
    font-size: clamp(0.8rem, 1vw, 0.95rem);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent-primary);
    margin-bottom: 8px;
    font-weight: 700;
}

input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(0.95rem, 1vw, 1rem);
}

input:focus {
    outline: none;
    border-color: var(--accent-secondary);
    background: rgba(255,255,255,0.06);
}

.error-msg {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border-left: 3px solid #ef4444;
}

.btn-login {
    width: 100%;
    padding: 16px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 10px;
}

.btn-login:hover {
    background: var(--accent-primary);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
}

.footer-links {
    margin-top: 30px;
    text-align: center;
    font-size: clamp(0.9rem, 1vw, 1rem);
    color: var(--text-dim);
}

.footer-links a {
    color: var(--text-main);
    text-decoration: none;
    font-weight: 700;
    margin-left: 5px;
}

.footer-links a:hover {
    color: var(--accent-secondary);
    text-decoration: underline;
}

/* Decoration */
.geo-accent {
    position: absolute;
    top: 20px;
    right: 20px;
    opacity: 0.2;
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>

<div class="top-nav">
    <a href="/" class="brand">CROWDSOLVER</a>
</div>

<div class="page">
    <div class="login-card">
        <div class="geo-accent">
            <i class="fa-solid fa-shield-halved fa-2x"></i>
        </div>

        <h2>AUTHENTICATE</h2>
        <p>Enter the community digital portal.</p>

        {% if err %}
        <div class="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ err }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Protocol ID (Email)</label>
                <input type="email" name="loginmail" placeholder="user@domain.com" required>
            </div>

            <div class="input-group">
                <label>Security Key (Password)</label>
                <input type="password" name="loginpassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Initialize Session</button>
        </form>

        <div class="footer-links">
            New Entity? <a href="{% url 'membersignup' %}">Request Access</a>
        </div>
    </div>
</div>

</body>
</html>
