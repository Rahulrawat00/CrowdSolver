<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Deployment Protocol</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-secondary: #FF4DCC; /* Secretary Accent */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s ease;
}

body {
    margin: 0;
    min-height: 100vh;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* ================= BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 10% 10%, #1a1018 0%, #0a0a0b 100%);
}

/* ================= FORM CARD ================= */
.form-card {
    width: 100%;
    max-width: 700px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 50px;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Status Indicator */
.protocol-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-secondary);
    margin-bottom: 20px;
}

/* ================= CONTEXT BOX ================= */
.issue-context {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 35px;
}

.issue-context span {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 1px;
}

.issue-context h3 {
    margin: 5px 0 0;
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    color: var(--accent-secondary);
}

/* ================= INPUTS ================= */
.form-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -1.5px;
    margin: 0 0 10px;
    text-transform: uppercase;
}

label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 10px;
}

input, textarea {
    width: 100%;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 16px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    margin-bottom: 25px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent-secondary);
    background: rgba(255, 255, 255, 0.05);
}

textarea { min-height: 150px; resize: none; }

/* ================= ACTIONS ================= */
.actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 10px;
}

.btn {
    padding: 18px;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1.5px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.btn-primary {
    background: var(--accent-secondary);
    color: white;
    border: none;
    box-shadow: 0 10px 20px rgba(255, 77, 204, 0.2);
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(255, 77, 204, 0.4);
}

.btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--glass-border);
}

.btn-secondary:hover {
    border-color: var(--text-main);
    color: var(--text-main);
    background: rgba(255,255,255,0.05);
}

/* ================= MESSAGES ================= */
.success-msg {
    background: rgba(16, 185, 129, 0.1);
    color: #10b981;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 25px;
    font-size: 13px;
    border: 1px solid rgba(16, 185, 129, 0.2);
    display: flex;
    align-items: center;
    gap: 10px;
}

@media (max-width: 600px) {
    .form-card { padding: 30px; }
    .actions { grid-template-columns: 1fr; }
    .form-header h2 { font-size: 1.8rem; }
}
</style>
</head>

<body>

<div class="art-bg"></div>

<div class="form-card">

    {% if mess %}
        <div class="success-msg">
            <i class="fa-solid fa-circle-check"></i> {{ mess }}
        </div>
    {% endif %}

    <div class="protocol-tag">
        <i class="fa-solid fa-microchip"></i> Deployment Protocol
    </div>

    <div class="form-header">
        <h2>Add Solution</h2>
    </div>

    <div class="issue-context">
        <span>Targeting Issue:</span>
        <h3>{{ issue.title }}</h3>
    </div>

    <form method="post" action="{% url 'solutions' issue.id %}">
        {% csrf_token %}

        <label>Solution Headline</label>
        <input type="text" name="title" placeholder="Summary of the action plan..." required>

        <label>Technical Details / Description</label>
        <textarea name="description" placeholder="Explain the implementation steps in detail..." required></textarea>

        <div class="actions">
            <button type="submit" class="btn btn-primary">
                Deploy Solution <i class="fa-solid fa-paper-plane"></i>
            </button>

            <a href="{% url 'notification' %}" class="btn btn-secondary">
                <i class="fa-solid fa-chevron-left"></i> Cancel
            </a>
        </div>
    </form>

</div>

</body>
</html>
