<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Initialize Entity</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1;
    --accent-secondary: #FF4DCC;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 90% 90%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.1;
}
.orb-1 { background: var(--accent-primary); top: -100px; left: -100px; }
.orb-2 { background: var(--accent-secondary); bottom: -100px; right: -100px; }

/* ================= TOP NAV ================= */
.top-nav {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
}

.brand {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -1px;
    text-decoration: none;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 10px;
}

/* ================= SIGNUP CARD ================= */
.page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
}

.signup-card {
    width: 100%;
    max-width: 680px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 50px;
    position: relative;
    box-shadow: 0 50px 100px rgba(0,0,0,0.4);
}

.signup-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1.5px;
    color: var(--text-main);
}

.signup-card p {
    color: var(--text-dim);
    font-size: 15px;
    margin: 12px 0 40px;
    max-width: 500px;
    line-height: 1.6;
}

/* ================= FORM ARCHITECTURE ================= */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}

.full-width { grid-column: span 2; }

.input-group {
    margin-bottom: 5px;
}

label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-primary);
    margin-bottom: 10px;
    font-weight: 700;
}

input, select {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 15px 18px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--accent-secondary);
    background: rgba(255,255,255,0.05);
}

select option {
    background: var(--bg-dark);
    color: var(--text-main);
}

.error-bar {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 15px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 30px;
    border-left: 4px solid #ef4444;
    font-weight: 500;
}

/* ================= BUTTONS ================= */
.action-area {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn-submit {
    width: 100%;
    padding: 18px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 12px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
}

.btn-submit:hover {
    background: var(--accent-primary);
    color: white;
    transform: translateY(-4px);
    box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
}

.btn-back {
    text-align: center;
    padding: 15px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 14px;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
}

.btn-back:hover {
    color: var(--text-main);
    background: var(--glass-bg);
}

.footer-note {
    margin-top: 35px;
    text-align: center;
    font-size: 14px;
    color: var(--text-dim);
}

.footer-note a {
    color: var(--accent-secondary);
    text-decoration: none;
    font-weight: 700;
}

@media(max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .full-width { grid-column: span 1; }
    .signup-card { padding: 35px 25px; }
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>

<div class="top-nav">
    <a href="/" class="brand">CROWDSOLVER</a>
</div>

<div class="page">
    <div class="signup-card">
        <h2>NEW ENTITY</h2>
        <p>Register your residential credentials to synchronize with the community protocol.</p>

        {% if err %}
        <div class="error-bar">
            <i class="fa-solid fa-circle-exclamation" style="margin-right: 8px;"></i> {{ err }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-grid">
                <div class="input-group">
                    <label>Legal Name</label>
                    <input type="text" name="membername" placeholder="John Doe" value="{{ form_data.membername|default:'' }}" required>
                </div>

                <div class="input-group">
                    <label>Unit/Flat ID</label>
                    <input type="text" name="flatnumber" placeholder="EX: B-102" value="{{ form_data.flatnumber|default:'' }}" required>
                </div>

                <div class="input-group full-width">
                    <label>Communication Uplink (Email)</label>
                    <input type="email" name="memberemail" placeholder="identity@domain.com" value="{{ form_data.memberemail|default:'' }}" required>
                </div>

                <div class="input-group full-width">
                    <label>Contact Vector (Phone)</label>
                    <input type="tel" name="membercontact" pattern="[0-9]{10}" maxlength="10" placeholder="Primary 10-digit mobile" value="{{ form_data.membercontact|default:'' }}" required>
                </div>

                <div class="input-group">
                    <label>Access Key</label>
                    <input type="password" name="memberpass" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label>Verify Key</label>
                    <input type="password" name="membercpass" placeholder="••••••••" required>
                </div>

                <div class="input-group full-width">
                    <label>Residential Classification</label>
                    <select name="residentType" required>
                        <option value="">Choose classification...</option>
                        <option value="OWNER" {% if form_data.residentType == 'OWNER' %}selected{% endif %}>Property Owner</option>
                        <option value="RENTER" {% if form_data.residentType == 'RENTER' %}selected{% endif %}>Tenant/Renter</option>
                    </select>
                </div>
            </div>

            <div class="action-area">
                <button type="submit" class="btn-submit">Initialize Account</button>
                <a href="{% url 'memberlogin' %}" class="btn-back">Return to Command</a>
            </div>
        </form>

        <div class="footer-note">
            Already verified? <a href="{% url 'memberlogin' %}">Authenticate here</a>
        </div>
    </div>
</div>

</body>
</html>
