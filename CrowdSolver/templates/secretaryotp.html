<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | 2FA Authentication</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1;
    --accent-admin: #FF4DCC;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
}
.orb-1 { background: var(--accent-admin); bottom: -100px; left: -100px; }
.orb-2 { background: var(--accent-primary); top: -100px; right: -100px; }

/* ================= VERIFY CARD ================= */
.verify-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 50px 40px;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    text-align: center;
}

/* Security Scanline Effect */
.verify-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; width: 80%; height: 2px;
    background: var(--accent-admin);
    box-shadow: 0 0 15px var(--accent-admin);
    border-radius: 20px;
}

.verify-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1px;
    text-transform: uppercase;
    color: var(--text-main);
}

.verify-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 12px 0 35px;
    line-height: 1.5;
}

/* ================= FORM ELEMENTS ================= */
.error-msg {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border-left: 3px solid #ef4444;
    text-align: left;
}

label {
    display: block;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-admin);
    margin-bottom: 10px;
    font-weight: 700;
}

input {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 18px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 12px;
    text-align: center;
    margin-bottom: 25px;
}

input:focus {
    outline: none;
    border-color: var(--accent-admin);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(255, 77, 204, 0.15);
}

input::placeholder {
    letter-spacing: 8px;
    color: var(--glass-border);
}

.verify-btn {
    width: 100%;
    padding: 18px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 12px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.verify-btn:hover {
    background: var(--accent-admin);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(255, 77, 204, 0.3);
}

.note {
    margin-top: 30px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    letter-spacing: 0.5px;
}

.shield-icon {
    font-size: 40px;
    color: var(--accent-admin);
    margin-bottom: 15px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>

<div class="verify-card">
    <div class="shield-icon">
        <i class="fa-solid fa-user-lock"></i>
    </div>

    <h2>2FA_AUTH</h2>
    <p>Verification required for high-level access. Enter the 4-digit token sent to your secure mail.</p>

    {% if err %}
        <div class="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ err }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Passcode Token</label>
        <input
            type="text"
            name="otp"
            maxlength="4"
            placeholder="0000"
            required
            autocomplete="one-time-code"
        >

        <button type="submit" class="verify-btn">
            Validate Identity <i class="fa-solid fa-fingerprint"></i>
        </button>
    </form>

    <div class="note">
        Session security active. <br>
        If the code has expired, please re-authenticate.
    </div>

</div>

</body>
</html>
