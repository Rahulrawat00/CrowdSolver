<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Secure Authorization</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-admin: #FF4DCC; /* Consistent Secretary Pink */
    --accent-primary: #6366F1;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
}
.orb-1 { background: var(--accent-admin); bottom: -100px; left: -100px; }
.orb-2 { background: var(--accent-primary); top: -100px; right: -100px; }

/* ================= VERIFY CARD ================= */
.verify-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 60px 40px;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    text-align: center;
    animation: cardSlideIn 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes cardSlideIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Security Scanline Effect */
.verify-card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; width: 70%; height: 3px;
    background: var(--accent-admin);
    box-shadow: 0 0 20px var(--accent-admin);
    border-radius: 0 0 10px 10px;
}

.shield-icon {
    font-size: 3rem;
    color: var(--accent-admin);
    margin-bottom: 25px;
    filter: drop-shadow(0 0 15px rgba(255, 77, 204, 0.4));
}

.verify-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1.5px;
    text-transform: uppercase;
}

.verify-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 15px 0 40px;
    line-height: 1.6;
}

/* ================= FORM ELEMENTS ================= */
.error-msg {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 14px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 25px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
}

label {
    display: block;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-admin);
    margin-bottom: 12px;
    font-weight: 800;
}

input {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    color: var(--text-main);
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 15px;
    text-align: center;
    margin-bottom: 30px;
    text-indent: 15px; /* Centers the text properly with letter spacing */
}

input:focus {
    outline: none;
    border-color: var(--accent-admin);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 25px rgba(255, 77, 204, 0.2);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.05);
}

.verify-btn {
    width: 100%;
    padding: 20px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 16px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    font-size: 13px;
}

.verify-btn:hover {
    background: var(--accent-admin);
    color: white;
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(255, 77, 204, 0.4);
}

.note {
    margin-top: 35px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.note strong {
    color: var(--text-main);
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>

<div class="verify-card">
    <div class="shield-icon">
        <i class="fa-solid fa-user-shield"></i>
    </div>

    <h2>Protocol_2FA</h2>
    <p>High-level access requires dual-layer validation. Enter the 4-digit synchronization token sent to your terminal.</p>

    {% if err %}
        <div class="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i> {{ err }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Verification Token</label>
        <input
            type="text"
            name="otp"
            maxlength="4"
            placeholder="0000"
            required
            pattern="\d{4}"
            inputmode="numeric"
            autocomplete="one-time-code"
        >

        <button type="submit" class="verify-btn">
            Confirm Identity <i class="fa-solid fa-unlock-keyhole"></i>
        </button>
    </form>

    <div class="note">
        Encrypted Session <strong>Active</strong><br>
        Token expires shortly. Do not share this code.
    </div>

</div>

</body>
</html>
