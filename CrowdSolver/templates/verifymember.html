<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Identity Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1; /* Member Primary Indigo */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #0f101a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.1;
    background: var(--accent-primary);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ================= VERIFY CARD ================= */
.verify-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 60px 40px;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    text-align: center;
    animation: authEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

@keyframes authEntry {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Indigo Accent Top Line */
.verify-card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; width: 70%; height: 3px;
    background: var(--accent-primary);
    box-shadow: 0 0 20px var(--accent-primary);
}

.shield-icon {
    font-size: 3rem;
    color: var(--accent-primary);
    margin-bottom: 25px;
    filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.3));
}

.verify-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1.5px;
    text-transform: uppercase;
}

.verify-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 15px 0 40px;
    line-height: 1.6;
}

/* ================= FORM ELEMENTS ================= */
.error-msg {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 14px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 25px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

label {
    display: block;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-primary);
    margin-bottom: 12px;
    font-weight: 800;
}

input {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    color: var(--text-main);
    font-family: 'Syne', sans-serif;
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 15px;
    text-align: center;
    margin-bottom: 30px;
    text-indent: 15px;
}

input:focus {
    outline: none;
    border-color: var(--accent-primary);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 25px rgba(99, 102, 241, 0.2);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.05);
}

.verify-btn {
    width: 100%;
    padding: 20px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 16px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    font-size: 13px;
}

.verify-btn:hover {
    background: var(--accent-primary);
    color: white;
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
}

/* ================= FOOTER ================= */
.note {
    margin-top: 35px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.8;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.note strong {
    color: var(--text-main);
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb"></div>
</div>

<div class="verify-card">
    <div class="shield-icon">
        <i class="fa-solid fa-envelope-open-text"></i>
    </div>

    <h2>Finalize_Auth</h2>
    <p>A 4-digit code has been dispatched to your registered email. Enter it below to initialize your session.</p>

    {% if err %}
        <div class="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ err }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="otp">Security Token</label>
        <input
            type="text"
            id="otp"
            name="motp"
            placeholder="0000"
            maxlength="4"
            required
            inputmode="numeric"
            autocomplete="one-time-code"
        >

        <button type="submit" class="verify-btn">
            Verify Identity <i class="fa-solid fa-shield-halved"></i>
        </button>
    </form>

    <div class="note">
        Token expires in <strong>5 Minutes</strong>.<br>
        Missing email? Check your <strong>Spam Folder</strong>.
    </div>

</div>

</body>
</html>
