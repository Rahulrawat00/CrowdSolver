<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Secure Authentication</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1; /* Member flow Indigo */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html {
    font-size: clamp(14px, 1.2vw, 16px);
}

h1 { font-size: clamp(2rem, 4vw, 3rem); }
h2 { font-size: clamp(1.6rem, 3vw, 2.4rem); }
h3 { font-size: clamp(1.25rem, 2.3vw, 1.8rem); }
p, label, button, input, textarea, select { font-size: clamp(0.95rem, 1.1vw, 1rem); }

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
}
.orb-1 { background: var(--accent-primary); bottom: -100px; right: -100px; }

/* ================= VERIFY CARD ================= */
.verify-card {
    width: 100%;
    max-width: min(100%, 420px);
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: clamp(28px, 4vw, 50px);
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    text-align: center;
}

/* Accent Line */
.verify-card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; width: 70%; height: 3px;
    background: var(--accent-primary);
    box-shadow: 0 0 15px var(--accent-primary);
    border-radius: 0 0 10px 10px;
}

.verify-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 2.8vw, 2.4rem);
    font-weight: 800;
    margin: 0;
    letter-spacing: -1px;
    text-transform: uppercase;
}

.verify-card p {
    color: var(--text-dim);
    font-size: clamp(0.95rem, 1vw, 1rem);
    margin: 12px 0 35px;
    line-height: 1.5;
}

/* ================= FORM ELEMENTS ================= */
.error-msg {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border-left: 3px solid #ef4444;
    text-align: left;
}

label {
    display: block;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-primary);
    margin-bottom: 10px;
    font-weight: 700;
}

input {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 18px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.1rem);
    font-weight: 700;
    letter-spacing: 12px;
    text-align: center;
    margin-bottom: 25px;
}

input:focus {
    outline: none;
    border-color: var(--accent-primary);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
}

input::placeholder {
    letter-spacing: 8px;
    color: var(--glass-border);
}

.verify-btn {
    width: 100%;
    padding: 18px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 12px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.verify-btn:hover {
    background: var(--accent-primary);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
}

.note {
    margin-top: 30px;
    font-size: clamp(0.9rem, 1vw, 1rem);
    color: var(--text-dim);
    line-height: 1.6;
}

.icon-box {
    font-size: 32px;
    color: var(--accent-primary);
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
</div>

<div class="verify-card">
    <div class="icon-box">
        <i class="fa-solid fa-envelope-open-text"></i>
    </div>

    <h2>Confirm Identity</h2>
    <p>A verification token was dispatched to your inbox. Enter the code below to gain access.</p>

    {% if err %}
        <div class="error-msg">
            <i class="fa-solid fa-triangle-exclamation"></i> {{ err }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="otp">Security Token</label>
        <input
            type="text"
            id="otp"
            name="motp"
            placeholder="0000"
            maxlength="4"
            required
            autocomplete="one-time-code"
        >

        <button type="submit" class="verify-btn">
            Access Terminal <i class="fa-solid fa-right-to-bracket"></i>
        </button>
    </form>

    <div class="note">
        Token expires in <strong>5 minutes</strong>.<br>
        Missing email? Verify your spam folder.
    </div>
</div>

</body>
</html>
