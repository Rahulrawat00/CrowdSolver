<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Administrative Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-secretary: #FF4DCC; /* Signature Secretary Pink */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.25s ease;
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

/* ===== ATMOSPHERIC BACKGROUND ===== */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 70% 30%, #1a1018 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.12;
    background: var(--accent-secretary);
    top: -200px;
    right: -100px;
}

/* ===== LOGIN CARD ===== */
.auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 50px 40px;
    position: relative;
    box-shadow: 0 50px 100px rgba(0,0,0,0.6);
    animation: authEntry 0.8s cubic-bezier(0.23, 1, 0.32, 1);
}

@keyframes authEntry {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Secretary Accent Top Line */
.auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; width: 70%; height: 3px;
    background: var(--accent-secretary);
    box-shadow: 0 0 20px var(--accent-secretary);
}

.auth-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -1.5px;
    margin: 0;
    line-height: 1;
}

.auth-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 12px 0 35px;
    letter-spacing: 0.5px;
}

/* ===== FORM ===== */
.error-box {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 14px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 25px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    display: flex;
    align-items: center;
    gap: 10px;
}

label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-secretary);
    margin-bottom: 8px;
    font-weight: 800;
}

input {
    width: 100%;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    margin-bottom: 20px;
}

input:focus {
    outline: none;
    border-color: var(--accent-secretary);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 20px rgba(255, 77, 204, 0.1);
}

/* ===== BUTTON ===== */
.btn-auth {
    width: 100%;
    padding: 18px;
    background: var(--text-main);
    color: var(--bg-dark);
    border: none;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    font-size: 13px;
    margin-top: 10px;
}

.btn-auth:hover {
    background: var(--accent-secretary);
    color: white;
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(255, 77, 204, 0.3);
}

/* ===== FOOTER ===== */
.auth-footer {
    margin-top: 35px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.auth-footer a {
    color: var(--text-main);
    text-decoration: none;
    font-weight: 700;
    margin-left: 5px;
    border-bottom: 1px solid var(--glass-border);
}

.auth-footer a:hover {
    color: var(--accent-secretary);
    border-color: var(--accent-secretary);
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb"></div>
</div>

<div class="auth-card">

    <h2>Command_Login</h2>
    <p>Secretary level authorization required for community oversight.</p>

    {% if err %}
        <div class="error-box">
            <i class="fa-solid fa-key"></i> {{ err }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Admin Identifier</label>
        <input type="email" name="email" placeholder="secretary@command.io" required>

        <label>Security Key</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn-auth">
            Initialize Access
        </button>
    </form>

    <div class="auth-footer">
        System Override?
        <a href="{% url 'admindashboard' %}">Return to Grid</a>
    </div>

</div>

</body>
</html>
