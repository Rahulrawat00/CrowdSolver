<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secretary Login | CrowdSolver</title>

<style>
:root{
    --primary:#2563eb;
    --bg:#f5f8ff;
    --card:#ffffff;
    --border:#e5e7eb;
    --text:#0f172a;
    --muted:#64748b;
}

*{
    box-sizing:border-box;
    font-family:"Inter","Segoe UI",sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:
        radial-gradient(600px circle at left top,#e0e7ff,transparent),
        radial-gradient(600px circle at right bottom,#ede9fe,transparent),
        var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== CARD ===== */
.login-card{
    width:100%;
    max-width:420px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:36px 34px;
    box-shadow:0 20px 45px rgba(0,0,0,.08);
}

/* ===== HEADER ===== */
.login-card h2{
    margin:0;
    font-size:24px;
    font-weight:600;
    color:var(--text);
}

.login-card p{
    margin:8px 0 24px;
    font-size:14px;
    color:var(--muted);
}

/* ===== ERROR ===== */
.error{
    background:#fee2e2;
    color:#991b1b;
    padding:10px 14px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:16px;
}

/* ===== FORM ===== */
label{
    font-size:13px;
    font-weight:600;
    color:#334155;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    font-size:14px;
    margin-bottom:18px;
}

input:focus{
    outline:none;
    border-color:var(--primary);
}

/* ===== BUTTON ===== */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:#fff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
}

.btn:hover{
    background:#1e40af;
}

/* ===== FOOTER ===== */
.footer{
    margin-top:22px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
}

.footer a{
    color:var(--primary);
    font-weight:600;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-card">

    <h2>Secretary Login</h2>
    <p>Access administrative controls and community oversight</p>

    {% if err %}
        <div class="error">{{ err }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Email Address</label>
        <input type="email" name="email" placeholder="secretary@example.com" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit" class="btn">
            Continue
        </button>
    </form>

    <div class="footer">
        Back to
        <a href="{% url 'admindashboard' %}">Dashboard</a>
    </div>

</div>

</body>
</html>
