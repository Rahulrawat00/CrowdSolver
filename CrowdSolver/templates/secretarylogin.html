<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Administrative Access</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-primary: #6366F1;
    --accent-admin: #FF4DCC; /* Secretary/Admin specific color */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    margin: 0;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

/* ================= ARTISTIC BACKGROUND ================= */
.art-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: radial-gradient(circle at 50% 50%, #16161a 0%, #0a0a0b 100%);
}

.glow-orb {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.1;
}
.orb-1 { background: var(--accent-admin); top: -200px; left: -100px; }

/* ================= LOGIN CARD ================= */
.admin-card {
    width: 100%;
    max-width: 440px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 50px 40px;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6);
}

/* Admin Indicator Line */
.admin-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--accent-admin), var(--accent-primary));
    border-radius: 24px 24px 0 0;
}

.admin-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1.5px;
    text-transform: uppercase;
}

.admin-card p {
    color: var(--text-dim);
    font-size: 14px;
    margin: 10px 0 35px;
    letter-spacing: 0.5px;
}

/* ================= FORM ELEMENTS ================= */
.input-group {
    margin-bottom: 24px;
}

label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-admin);
    margin-bottom: 8px;
    font-weight: 700;
}

input {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: var(--accent-admin);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 15px rgba(255, 77, 204, 0.1);
}

.error-box {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    text-align: center;
}

.btn-admin {
    width: 100%;
    padding: 16px;
    background: var(--accent-admin);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.btn-admin:hover {
    background: white;
    color: var(--bg-dark);
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(255, 77, 204, 0.4);
}

.footer-nav {
    margin-top: 30px;
    text-align: center;
    font-size: 13px;
}

.footer-nav a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
}

.footer-nav a:hover {
    color: var(--text-main);
    border-color: var(--accent-admin);
}

.secure-badge {
    position: absolute;
    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--glass-border);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    white-space: nowrap;
}
</style>
</head>

<body>

<div class="art-bg">
    <div class="glow-orb orb-1"></div>
</div>

<div class="admin-card">
    <div class="secure-badge">End-to-End Encrypted Terminal</div>

    <h2>SEC_LOGIN</h2>
    <p>Administrative Oversight Portal</p>

    {% if err %}
        <div class="error-box">
            <i class="fa-solid fa-shield-virus"></i> {{ err }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <label>Admin ID</label>
            <input type="email" name="email" placeholder="secretary@system.com" required>
        </div>

        <div class="input-group">
            <label>Master Key</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-admin">
            Elevate Permissions <i class="fa-solid fa-arrow-right-long"></i>
        </button>
    </form>

    <div class="footer-nav">
        <a href="{% url 'admindashboard' %}"><i class="fa-solid fa-chevron-left"></i> Return to Main Dashboard</a>
    </div>
</div>

</body>
</html>
