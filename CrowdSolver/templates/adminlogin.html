<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSolver | Admin Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

<style>
:root {
    --bg-dark: #0A0A0B;
    --accent-admin: #FF2D7B; /* Secretary Signature Magenta */
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #F4F4F9;
    --text-dim: #94A3B8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    /* Subtle Admin-specific glow */
    background-image: 
        radial-gradient(circle at 100% 0%, rgba(255, 45, 123, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 0% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
}

/* ================= LOGIN CARD ================= */
.login-card {
    width: 100%;
    max-width: 400px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    padding: 50px 40px;
    position: relative;
    box-shadow: 0 50px 100px rgba(0,0,0,0.5);
    animation: slideUp 0.8s ease-out;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Magenta Top Accent */
.login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; width: 60%; height: 4px;
    background: var(--accent-admin);
    box-shadow: 0 0 20px var(--accent-admin);
    border-radius: 0 0 10px 10px;
}

.admin-icon {
    font-size: 2.5rem;
    color: var(--accent-admin);
    margin-bottom: 20px;
    text-align: center;
    display: block;
}

h2 {
    font-family: 'Syne', sans-serif;
    text-align: center;
    font-size: 1.8rem;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 10px;
}

.subtitle {
    color: var(--text-dim);
    text-align: center;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 40px;
    display: block;
}

/* ================= FORM ELEMENTS ================= */
label {
    display: block;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent-admin);
    margin-bottom: 8px;
    margin-left: 5px;
}

input {
    width: 100%;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 16px 20px;
    color: var(--text-main);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    margin-bottom: 25px;
}

input:focus {
    outline: none;
    border-color: var(--accent-admin);
    background: rgba(255, 45, 123, 0.05);
    box-shadow: 0 0 20px rgba(255, 45, 123, 0.1);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.1);
}

button {
    width: 100%;
    padding: 18px;
    border: none;
    background: var(--accent-admin);
    color: white;
    border-radius: 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
    box-shadow: 0 10px 25px rgba(255, 45, 123, 0.3);
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 45, 123, 0.5);
    background: #ff4d94;
}

.footer-note {
    text-align: center;
    margin-top: 30px;
    font-size: 11px;
    color: var(--text-dim);
}

.footer-note a {
    color: var(--text-main);
    text-decoration: none;
    font-weight: 700;
}
</style>

</head>
<body>

<div class="login-card">
    <i class="fa-solid fa-user-shield admin-icon"></i>
    <h2>Admin_Login</h2>
    <span class="subtitle">Secretary Command Center</span>

    <form method="POST">
        {% csrf_token %}
        
        <label>System Credentials</label>
        <input type="email" name="email" placeholder="Admin Email" required>

        <label>Access Key</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit">
            Initialize Session <i class="fa-solid fa-key" style="margin-left: 8px;"></i>
        </button>
    </form>

    <div class="footer-note">
        Authorized Personnel Only.<br>
        <a href="/">Return to Public Terminal</a>
    </div>
</div>

</body>
</html>
